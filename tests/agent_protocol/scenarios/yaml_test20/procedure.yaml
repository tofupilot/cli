name: Y20 Slider Boundaries
version: 1.0.0

main:
  - key: cfg
    name: Configure
    python: phases.cfg
    ui:
      components:
        - type: slider
          key: temp
          label: Target temp (°C)
          required: true
          min: -20
          max: 80
          step: 0.5
        - type: number_input
          key: count
          label: Iterations
          required: true
          min: 1
          max: 1000
