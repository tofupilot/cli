name: Y19 Text Constraints
version: 1.0.0

main:
  - key: sn
    name: Serial Number
    python: phases.sn
    ui:
      components:
        - type: text_input
          key: serial
          label: Serial Number
          required: true
          min_length: 4
          max_length: 12
          pattern: "^SN-[0-9]+$"
