# cargo-deny configuration. Run: `cargo deny check`
# Gates the dependency tree on advisories, licenses, and duplicate/banned
# crates. The CI job (`.github/workflows/test-cli.yml`) runs this on every PR.

[advisories]
version = 2
# Fail on any security vulnerability. `unmaintained` advisories that we cannot
# action (transitive, no upstream fix yet) are listed explicitly below so a NEW
# unmaintained crate still trips the gate.
ignore = [
    # `paste` is unmaintained (RUSTSEC-2024-0436). Pulled transitively by
    # `specta` (-> station-protocol) and `rav1e`/`ravif` (-> image). No direct
    # fix available until those upstreams migrate; it is a proc-macro with no
    # runtime attack surface. Revisit when specta/image drop it.
    "RUSTSEC-2024-0436",
    # `proc-macro-error2` is unmaintained (RUSTSEC-2026-0173). Pulled
    # transitively by `validator_derive` (-> validator -> execution-engine).
    # Compile-time-only proc-macro with no runtime attack surface; no upstream
    # fix yet. Revisit when validator drops it.
    "RUSTSEC-2026-0173",
]

[licenses]
version = 2
# Permissive licenses compatible with shipping an MIT binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
# Allowed only to accommodate workspace path deps; the tree currently has no
# external git dependencies. Tighten to "deny" if that stays true and tooling
# stops needing the escape hatch.
unknown-git = "allow"
